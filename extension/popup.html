<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ANVIX</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 14px; width: 300px; background: #0b0d10; color: #f5f7fa; }
      h1 { font-size: 14px; margin: 0 0 8px; letter-spacing: 0.02em; }
      p { font-size: 12px; color: #a3aab3; margin: 0 0 12px; line-height: 1.4; }
      a.btn { display: block; text-align: center; padding: 8px; background: #6b8afd; color: #0b0d10; text-decoration: none; border-radius: 6px; font-size: 13px; font-weight: 500; margin-bottom: 10px; }
      .recent { border-top: 1px solid #1f242a; padding-top: 10px; }
      .recent h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #6a7079; margin: 0 0 6px; }
      .recent ul { list-style: none; padding: 0; margin: 0; font-size: 12px; }
      .recent li { padding: 5px 0; border-bottom: 1px solid #1f242a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #cdd3da; }
      .recent li:last-child { border: 0; }
      .empty { color: #6a7079; font-style: italic; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>ANVIX</h1>
    <p>Highlight any suspicious message on LinkedIn, Gmail or WhatsApp Web, then right-click → <b>Investigate with ANVIX</b>.</p>
    <a class="btn" href="https://vetting-forge-ai.lovable.app/investigate" target="_blank">Open ANVIX</a>
    <div class="recent">
      <h2>Recent</h2>
      <ul id="recent"></ul>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
